# Heritage Saturday — local development infrastructure
# Scope: Capability 1 (roster import + basic game simulation) per company-docs/architecture.md.
#
# `docker compose up -d postgres redis` is the default dev stack and must never require a
# build. The `web` service is therefore behind a profile:
#
#   docker compose --profile web up --build web
#
# apps/api still runs on the host (`npm run start:dev`), so there is no `api` service —
# an apps/api Dockerfile is a separate follow-up, see docs/dev-setup.md.
#
# Cloud provider / IaC: none — this is local-only Docker Compose, not a cloud deployment.

services:
  postgres:
    image: postgres:16-alpine
    container_name: heritage-saturday-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heritage
      POSTGRES_PASSWORD: heritage
      POSTGRES_DB: heritage_saturday
    ports:
      # Host port 5433, not 5432: many dev machines already run a local Postgres on 5432,
      # which silently shadows Docker's port-forward on 127.0.0.1/::1 (hit while standing
      # this up in this environment). Container-internal port stays 5432; only the host
      # mapping differs. Update DATABASE_URL if you change this.
      - "5433:5432"
    volumes:
      - heritage_saturday_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heritage -d heritage_saturday"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: heritage-saturday-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - heritage_saturday_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    # Behind a profile: `docker compose up -d postgres redis` must not try to build an image.
    profiles: ["web"]
    build:
      # Repo root, not apps/web — this is an npm-workspaces monorepo and the build needs
      # packages/shared plus the hoisted root node_modules.
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time. This is the address the BROWSER
        # uses, so it is the host's published API port, not a container hostname.
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_DEV_USER_ID: dev-user-1
    container_name: heritage-saturday-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side fetches only (Server Components). Inside this container `localhost`
      # is the container, not the host — so SSR must reach the host-run API explicitly.
      # See apps/web/src/lib/config.ts.
      API_URL: http://host.docker.internal:3001
    extra_hosts:
      # Docker Desktop provides host.docker.internal; on Linux this mapping creates it.
      - "host.docker.internal:host-gateway"

  # NOTE: apps/api does not yet have a Dockerfile (it currently runs via `nest start` on the
  # host, against this compose stack's postgres/redis over localhost ports). An `api` service
  # is intentionally NOT defined yet. Add it here (with a
  # `build: { context: ., dockerfile: apps/api/Dockerfile }`) once a Dockerfile exists —
  # see docs/dev-setup.md. At that point `web`'s API_URL becomes `http://api:3001`.

volumes:
  heritage_saturday_postgres_data:
  heritage_saturday_redis_data:
