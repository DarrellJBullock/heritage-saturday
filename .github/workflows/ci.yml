name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch makes the in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # apps/api reads DATABASE_URL straight from process.env (schema.prisma uses env()),
  # so no .env file is needed — which is good, because .env is gitignored.
  # Note the port: 5432 here, not the 5433 used locally to dodge a host Postgres.
  DATABASE_URL: postgresql://heritage:heritage@localhost:5432/heritage_saturday?schema=public

jobs:
  check:
    name: Build, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # No postinstall hook generates the Prisma client, and apps/api's typecheck
      # imports @prisma/client types. Must run before typecheck, not after.
      - name: Generate Prisma client
        run: npm run prisma:generate -w @heritage-saturday/api

      # Deliberately a cold build: `npm ci` leaves no dist/, which is exactly the state
      # that once exposed a build-ordering bug (apps/* compiled before packages/* under
      # `--workspaces`). The root build script orders the layers; this proves it holds.
      - name: Build (dependency order, from cold)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  worker-smoke:
    name: Worker smoke (real Redis)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Only what the worker needs: the engine it shares with the API, and the worker
      # itself. No Prisma, no Next build — the worker deliberately never touches the DB.
      - name: Build worker and its packages
        run: |
          npm run build:packages
          npm run build -w @heritage-saturday/worker

      # Covers the transport, not the pure processor (that is in `npm test`): a job
      # round-trips through Redis, determinism survives JSON serialization through the
      # queue, and an unknown job name fails loudly instead of vanishing.
      - name: Worker smoke test
        run: npm run smoke -w @heritage-saturday/worker

  docker:
    name: Docker images build and run
    runs-on: ubuntu-latest

    # The api container needs a database to connect to. Runner services publish on
    # localhost, and the containers below use `--network host`, so they reach it there.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heritage
          POSTGRES_PASSWORD: heritage
          POSTGRES_DB: heritage_saturday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heritage -d heritage_saturday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Building is not enough. A stale tsbuildinfo once made `tsc --incremental` skip
      # emitting .js entirely: the image built clean and then crash-looped on a missing
      # dist/main.js. So each image is started and probed, not just built.
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t hs-api:ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t hs-web:ci .

      # The api image ships the prisma CLI, so migrations need no node toolchain here.
      - name: Run migrations from the api image
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            hs-api:ci npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Start api container
        run: |
          docker run -d --name hs-api --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            hs-api:ci

      - name: Probe the api container
        run: |
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null http://localhost:3001/imports -H 'x-user-id: qa-user-a'; then
              echo "api container is serving"; exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' hs-api)" != "true" ]; then
              echo "api container exited early:"; docker logs hs-api; exit 1
            fi
            sleep 2
          done
          echo "api container never became ready:"; docker logs hs-api; exit 1

      # API_URL is the server-side base for Server Components. On --network host the
      # runner's localhost is the api container's, so host.docker.internal is unnecessary.
      - name: Start web container
        run: |
          docker run -d --name hs-web --network host \
            -e API_URL=http://localhost:3001 \
            hs-web:ci

      - name: Probe the web container, including a Server Component that fetches the API
        run: |
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null http://localhost:3000/; then break; fi
            if [ "$(docker inspect -f '{{.State.Running}}' hs-web)" != "true" ]; then
              echo "web container exited early:"; docker logs hs-web; exit 1
            fi
            sleep 2
          done
          curl -sf -o /dev/null http://localhost:3000/ || { docker logs hs-web; exit 1; }
          # /imports is a Server Component that fetches the API server-side. A 200 here
          # proves the container reached the API, which a static page would not.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/imports)
          echo "GET /imports -> $code"
          [ "$code" = "200" ] || { docker logs hs-web; docker logs hs-api; exit 1; }

      - name: Container logs
        if: failure()
        run: docker logs hs-api || true; docker logs hs-web || true

      - name: Stop containers
        if: always()
        run: docker rm -f hs-api hs-web 2>/dev/null || true

  e2e:
    name: End-to-end (real Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heritage
          POSTGRES_PASSWORD: heritage
          POSTGRES_DB: heritage_saturday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heritage -d heritage_saturday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w @heritage-saturday/api

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      # Auth is a stub: the API trusts an x-user-id header and every FK requires that
      # User row to exist. The e2e suite drives the API as qa-user-a / qa-user-b, so
      # without this step every request 500s on a foreign-key violation.
      - name: Seed stub-auth users
        run: npx prisma db seed
        working-directory: apps/api

      - name: Start API
        run: |
          node apps/api/dist/main.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3001/imports -H 'x-user-id: qa-user-a'; then
              echo "API is up"; exit 0
            fi
            # Fail fast if the process died rather than burning the full timeout.
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "API process exited before becoming ready"; exit 1
            fi
            sleep 1
          done
          echo "API did not become ready within 60s"; exit 1

      - name: E2E suite
        run: node apps/api/test/e2e/run.mjs

      - name: Stop API
        if: always()
        run: kill "$API_PID" 2>/dev/null || true
