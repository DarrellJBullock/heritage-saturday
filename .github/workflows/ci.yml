name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch makes the in-flight run obsolete.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # apps/api reads DATABASE_URL straight from process.env (schema.prisma uses env()),
  # so no .env file is needed — which is good, because .env is gitignored.
  # Note the port: 5432 here, not the 5433 used locally to dodge a host Postgres.
  DATABASE_URL: postgresql://heritage:heritage@localhost:5432/heritage_saturday?schema=public

jobs:
  check:
    name: Build, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # No postinstall hook generates the Prisma client, and apps/api's typecheck
      # imports @prisma/client types. Must run before typecheck, not after.
      - name: Generate Prisma client
        run: npm run prisma:generate -w @heritage-saturday/api

      # Deliberately a cold build: `npm ci` leaves no dist/, which is exactly the state
      # that once exposed a build-ordering bug (apps/* compiled before packages/* under
      # `--workspaces`). The root build script orders the layers; this proves it holds.
      - name: Build (dependency order, from cold)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  worker-smoke:
    name: Worker smoke (real Redis)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Only what the worker needs: the engine it shares with the API, and the worker
      # itself. No Prisma, no Next build — the worker deliberately never touches the DB.
      - name: Build worker and its packages
        run: |
          npm run build:packages
          npm run build -w @heritage-saturday/worker

      # Covers the transport, not the pure processor (that is in `npm test`): a job
      # round-trips through Redis, determinism survives JSON serialization through the
      # queue, and an unknown job name fails loudly instead of vanishing.
      - name: Worker smoke test
        run: npm run smoke -w @heritage-saturday/worker

  docker:
    name: Docker images build and run
    runs-on: ubuntu-latest

    env:
      # Not a credential — a throwaway value so CI runs the containers in their real,
      # locked configuration (api gated by the secret, web's proxy presenting it) rather
      # than opting out with ALLOW_INSECURE_NO_API_KEY.
      API_SHARED_SECRET: ci-not-a-real-secret

    # The api container needs a database to connect to. Runner services publish on
    # localhost, and the containers below use `--network host`, so they reach it there.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heritage
          POSTGRES_PASSWORD: heritage
          POSTGRES_DB: heritage_saturday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heritage -d heritage_saturday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Building is not enough. A stale tsbuildinfo once made `tsc --incremental` skip
      # emitting .js entirely: the image built clean and then crash-looped on a missing
      # dist/main.js. So each image is started and probed, not just built.
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t hs-api:ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t hs-web:ci .

      # The api image ships the prisma CLI, so migrations need no node toolchain here.
      - name: Run migrations from the api image
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            hs-api:ci npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      # The image sets NODE_ENV=production, so the api refuses to boot without the secret.
      # Passing it here is what a real deployment does.
      - name: Start api container
        run: |
          docker run -d --name hs-api --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e API_SHARED_SECRET="$API_SHARED_SECRET" \
            hs-api:ci

      - name: Probe the api container
        run: |
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null http://localhost:3001/leagues \
                 -H "x-api-key: $API_SHARED_SECRET" -H 'x-user-id: qa-user-a'; then
              echo "api container is serving"; exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' hs-api)" != "true" ]; then
              echo "api container exited early:"; docker logs hs-api; exit 1
            fi
            sleep 2
          done
          echo "api container never became ready:"; docker logs hs-api; exit 1

      # The auth stub trusts x-user-id, so the shared-secret gate is the only thing keeping
      # a reachable api from being wide open. Prove it is actually on.
      - name: The api rejects callers without the shared secret
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/leagues \
                   -H 'x-user-id: qa-user-a')
          echo "GET /leagues without x-api-key -> $code"
          [ "$code" = "401" ] || { echo "expected 401, api is unprotected"; docker logs hs-api; exit 1; }

      # A production image with no secret and no explicit opt-out must fail to start.
      - name: The api refuses to boot unprotected in production
        run: |
          if docker run --rm --network host -e DATABASE_URL="$DATABASE_URL" hs-api:ci; then
            echo "api booted without API_SHARED_SECRET — fail-closed guard is broken"; exit 1
          fi
          echo "api correctly refused to start"

      # API_URL is the server-side base for Server Components. On --network host the
      # runner's localhost is the api container's, so host.docker.internal is unnecessary.
      # API_SHARED_SECRET is what lets both server-side paths — Server Components and the
      # /api/proxy route — get past the api's gate. Neither is NEXT_PUBLIC_*.
      # AUTH_SECRET is what Auth.js signs the session cookie with; it refuses to start without
      # one. Generated per-run: sessions never outlive the job. The image sets
      # NODE_ENV=production, so dev-login cannot exist here — nothing in this job can sign in,
      # which is exactly what the probes below assert.
      - name: Start web container
        run: |
          docker run -d --name hs-web --network host \
            -e API_URL=http://localhost:3001 \
            -e API_SHARED_SECRET="$API_SHARED_SECRET" \
            -e AUTH_SECRET="$(openssl rand -base64 32)" \
            hs-web:ci

      # /signin is the one page reachable signed out, so it is what proves the image boots and
      # serves at all. Probing / instead would pass on a redirect from a container that cannot
      # render anything.
      - name: Probe the web container
        run: |
          for i in $(seq 1 45); do
            if curl -sf -o /dev/null http://localhost:3000/signin; then break; fi
            if [ "$(docker inspect -f '{{.State.Running}}' hs-web)" != "true" ]; then
              echo "web container exited early:"; docker logs hs-web; exit 1
            fi
            sleep 2
          done
          curl -sf -o /dev/null http://localhost:3000/signin || { docker logs hs-web; exit 1; }

      # These four assertions are the deployed image's auth contract. They replace an older
      # pair that demanded 200 from a signed-out /imports and /api/proxy/imports — true when
      # apps/web was open, and now precisely what must not happen.
      #
      # A signed-out 200 from any page means the `authorized` callback is gone: Auth.js
      # defaults to *authorized*, so `export default auth` silently stops gating.
      - name: The deployed image is gated when signed out
        run: |
          fail() { echo "$1"; docker logs hs-web; docker logs hs-api; exit 1; }

          for path in / /leagues; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:3000$path")
            loc=$(curl -s -o /dev/null -w '%{redirect_url}' "http://localhost:3000$path")
            echo "GET $path -> $code ($loc)"
            [ "$code" = "307" ] || fail "expected 307 from $path; a 200 means pages are ungated"
            case "$loc" in */signin*) ;; *) fail "expected a redirect to /signin, got: $loc" ;; esac
          done

          # The browser's only path to the api must refuse without a session, and must say so
          # as JSON — a fetch() caller cannot parse an HTML redirect.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/proxy/leagues)
          echo "GET /api/proxy/leagues -> $code"
          [ "$code" = "401" ] || fail "expected 401 from the proxy route, got $code"

          body=$(curl -s http://localhost:3000/api/proxy/leagues)
          case "$body" in *UNAUTHENTICATED*) ;; *) fail "proxy 401 body was not JSON: $body" ;; esac

      # Auth.js will not infer its own origin under NODE_ENV=production: without AUTH_TRUST_HOST
      # (set in the Dockerfile) every auth() call throws UntrustedHost and sign-in is impossible.
      # The app still fails closed, so the gating probes above pass either way — this is the only
      # thing that catches it.
      - name: The deployed image can actually establish a session
        run: |
          if docker logs hs-web 2>&1 | grep -q "UntrustedHost"; then
            echo "web container cannot trust its own origin — nobody could sign in"
            docker logs hs-web; exit 1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/auth/providers)
          echo "GET /api/auth/providers -> $code"
          [ "$code" = "200" ] || { echo "Auth.js is not serving"; docker logs hs-web; exit 1; }

      - name: Container logs
        if: failure()
        run: docker logs hs-api || true; docker logs hs-web || true

      - name: Stop containers
        if: always()
        run: docker rm -f hs-api hs-web 2>/dev/null || true

  e2e:
    name: End-to-end (real Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heritage
          POSTGRES_PASSWORD: heritage
          POSTGRES_DB: heritage_saturday
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heritage -d heritage_saturday"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate -w @heritage-saturday/api

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      # The API trusts an x-user-id header (only apps/web may assert it) and every FK requires
      # that User row to exist. The e2e suite drives the API as qa-user-a / qa-user-b, and
      # apps/web's dev-login signs in as dev-user-1, so without this step every request 500s
      # on a foreign-key violation.
      - name: Seed fixture users
        run: npx prisma db seed
        working-directory: apps/api

      - name: Start API
        run: |
          node apps/api/dist/main.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3001/leagues -H 'x-user-id: qa-user-a'; then
              echo "API is up"; exit 0
            fi
            # Fail fast if the process died rather than burning the full timeout.
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "API process exited before becoming ready"; exit 1
            fi
            sleep 1
          done
          echo "API did not become ready within 60s"; exit 1

      # apps/web must run for the proxy identity/spoof and page-gating checks, which the suite
      # treats as mandatory under CI (see proxyIdentitySection). They are the only place the
      # header-forging defence and the `authorized` callback are exercised at all.
      #
      # `next dev`, not `next start`: dev-login is the identity those checks sign in as, and it
      # is deliberately impossible under a production build — `next start` sets
      # NODE_ENV=production, where assertDevLoginConfig() refuses to boot with ALLOW_DEV_LOGIN=true.
      - name: Start web
        env:
          API_URL: http://localhost:3001
          ALLOW_DEV_LOGIN: 'true'
        run: |
          # Generated once, here: sessions never outlive the job, and a hardcoded secret in a
          # public repo would become a real one the day someone copies this file. Auth.js
          # refuses to start without it.
          export AUTH_SECRET="$(openssl rand -base64 32)"
          npm run dev -w @heritage-saturday/web &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for web
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3000/signin; then
              echo "web is up"; exit 0
            fi
            if ! kill -0 "$WEB_PID" 2>/dev/null; then
              echo "web process exited before becoming ready"; exit 1
            fi
            sleep 1
          done
          echo "web did not become ready within 60s"; exit 1

      - name: E2E suite
        env:
          WEB_BASE: http://localhost:3000
        run: node apps/api/test/e2e/run.mjs

      - name: Stop web
        if: always()
        run: kill "$WEB_PID" 2>/dev/null || true

      - name: Stop API
        if: always()
        run: kill "$API_PID" 2>/dev/null || true
